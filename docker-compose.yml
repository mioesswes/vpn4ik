version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vpn_service
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  bot:
    build: .
    command: python run_bot.py
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpn:vpn@postgres:5432/vpn_service
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  api:
    build: .
    command: python run_api.py
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpn:vpn@postgres:5432/vpn_service
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
